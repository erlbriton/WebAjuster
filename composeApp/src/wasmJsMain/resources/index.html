<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Compose App</title>
</head>
<body>
<script>
    // Реализуем функцию прямо в глобальной области видимости окна
    window.askForSerialPort = function() {
        if ('serial' in navigator) {
            navigator.serial.requestPort()
                .then(port => {
                    console.log('Порт выбран успешно:', port);
                })
                .catch(err => {
                    console.error('Пользователь не выбрал порт или ошибка:', err);
                });
        } else {
            alert('Web Serial API не поддерживается вашим браузером');
        }
    };
</script>

<script src="composeApp.js"></script>
</body>
</html>
