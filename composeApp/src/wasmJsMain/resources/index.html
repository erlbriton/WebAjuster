<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Compose App</title>
</head>
<body>
<script>
    // Реализуем функцию в глобальной области видимости
    window.askForSerialPort = async function() {
        if (!('serial' in navigator)) {
            alert('Web Serial API не поддерживается вашим браузером. Используйте Chrome, Edge или Opera.');
            return;
        }

        try {
            // 1. Запрос выбора порта у пользователя
            const port = await navigator.serial.requestPort();

            // 2. Открытие порта с настройками (для CP2103 обычно 115200)
            // Вы можете изменить baudRate под ваши задачи
            await port.open({
                baudRate: 115200,
                dataBits: 8,
                stopBits: 1,
                parity: 'none',
                flowControl: 'none'
            });

            console.log('Порт успешно открыт на скорости 115200!');

            // Сохраняем объект порта глобально для последующего чтения/записи
            window.selectedPort = port;

        } catch (err) {
            if (err.name === 'NotFoundError') {
                console.log('Пользователь отменил выбор порта.');
            } else {
                console.error('Ошибка при работе с Serial Port:', err);
            }
        }
    };
</script>

<script src="composeApp.js"></script>
</body>
</html>
