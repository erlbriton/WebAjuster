#Kotlin
kotlin.code.style=official
kotlin.daemon.jvmargs=-Xmx3072M

#Gradle
org.gradle.jvmargs=-Xmx3072M -Dfile.encoding=UTF-8
org.gradle.configuration-cache=true
org.gradle.caching=true

#Android
android.nonTransitiveRClass=true
android.useAndroidX=true

# Выделяем 4ГБ или 8ГБ в зависимости от вашего железа
org.gradle.jvmargs=-Xmx8g -XX:+UseParallelGC -Dfile.encoding=UTF-8
# Включаем параллельную сборку модулей
org.gradle.parallel=true
# Кеширование конфигурации (очень ускоряет повторные сборки)
org.gradle.configuration-cache=true
# Использование инкрементальной компиляции Kotlin
kotlin.incremental=true

org.gradle.vfs.watch=true
kotlin.incremental.useClasspathSnapshot=true
